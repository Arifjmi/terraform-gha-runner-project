name: Terraform Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

